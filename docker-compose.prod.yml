# ── Pi Enterprise Sandbox — Production Docker Compose ─────────────
# Overlay on top of docker-compose.yml:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Required env (no empty defaults for secrets):
#   POSTGRES_PASSWORD, SANDBOX_API_TOKEN, AGENT_INTERNAL_TOKEN, SANDBOX_JWT_SECRET
# Optional but recommended:
#   SANDBOX_CORS_ORIGINS, DOMAIN

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sandbox}
      POSTGRES_USER: ${POSTGRES_USER:-sandbox}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD for production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sandbox} -d ${POSTGRES_DB:-sandbox}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: always

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    image: enterprise-sandbox-nginx:latest
    container_name: pi-enterprise-nginx
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      # SSL certs (persistent — letsencrypt)
      - nginx_ssl:/etc/nginx/ssl
      # Let's Encrypt challenge directory
      - nginx_certbot:/var/www/certbot
    environment:
      DOMAIN: "${DOMAIN:-localhost}"
    depends_on:
      frontend:
        condition: service_started
      api-server:
        condition: service_started
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:80/nginx/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  sandbox:
    environment:
      DEPLOYMENT_ENV: production
      SANDBOX_DATABASE_URL: postgresql://${POSTGRES_USER:-sandbox}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD for production}@postgres:5432/${POSTGRES_DB:-sandbox}
      SANDBOX_API_TOKEN: ${SANDBOX_API_TOKEN:?Set SANDBOX_API_TOKEN for production}
      SANDBOX_AUTH_ENABLED: ${SANDBOX_AUTH_ENABLED:-true}
      SANDBOX_JWT_SECRET: ${SANDBOX_JWT_SECRET:?Set SANDBOX_JWT_SECRET for production}
      SANDBOX_JWT_ISSUER: ${SANDBOX_JWT_ISSUER:-pi-enterprise-sandbox}
      SANDBOX_JWT_AUDIENCE: ${SANDBOX_JWT_AUDIENCE:-pi-enterprise-sandbox}
      SANDBOX_AUTH_ALLOW_PUBLIC_REGISTER: "false"
      # Outbound: disabled or allowlist only (never unrestricted).
      SANDBOX_NETWORK_MODE: ${SANDBOX_NETWORK_MODE:-disabled}
      SANDBOX_CORS_ORIGINS: ${SANDBOX_CORS_ORIGINS:?Set SANDBOX_CORS_ORIGINS for production (no wildcard)}
      SANDBOX_CORS_ALLOW_CREDENTIALS: ${SANDBOX_CORS_ALLOW_CREDENTIALS:-true}
      SANDBOX_DEBUG: "false"
    depends_on:
      postgres:
        condition: service_healthy
    # No host port publish — internal compose network only (MCP/API).
    ports: []
    # ── Production resource limits ──────────────────────────────────
    deploy:
      resources:
        limits:
          cpus: "${SANDBOX_CPU_LIMIT:-2}"
          memory: "${SANDBOX_MEM_LIMIT:-1g}"
        reservations:
          cpus: "${SANDBOX_CPU_RESERVE:-0.5}"
          memory: "${SANDBOX_MEM_RESERVE:-256m}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${SANDBOX_PORT:-8081}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: always

  api-server:
    environment:
      DEPLOYMENT_ENV: production
      SANDBOX_API_TOKEN: ${SANDBOX_API_TOKEN:?Set SANDBOX_API_TOKEN for production}
      AGENT_INTERNAL_TOKEN: ${AGENT_INTERNAL_TOKEN:?Set AGENT_INTERNAL_TOKEN for production}
      AUTH_ENABLED: ${AUTH_ENABLED:-true}
      SANDBOX_AUTH_ENABLED: ${SANDBOX_AUTH_ENABLED:-true}
    # ── Production resource limits ──────────────────────────────────
    deploy:
      resources:
        limits:
          cpus: "${BFF_CPU_LIMIT:-${AGENT_CPU_LIMIT:-1}}"
          memory: "${BFF_MEM_LIMIT:-${AGENT_MEM_LIMIT:-512m}}"
        reservations:
          cpus: "${BFF_CPU_RESERVE:-${AGENT_CPU_RESERVE:-0.25}}"
          memory: "${BFF_MEM_RESERVE:-${AGENT_MEM_RESERVE:-128m}}"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: always
    # No ports exposed in production — all traffic goes through nginx
    ports: []

  agent:
    # Production: skills stay read-only; skill management tools disabled.
    environment:
      DEPLOYMENT_ENV: production
      SANDBOX_API_TOKEN: ${SANDBOX_API_TOKEN:?Set SANDBOX_API_TOKEN for production}
      AGENT_INTERNAL_TOKEN: ${AGENT_INTERNAL_TOKEN:?Set AGENT_INTERNAL_TOKEN for production}
      SKILLS_MODE: readonly
      SKILLS_ROOT: /home/sandbox/skill
      # Clear any product prompt file path unless explicitly provided.
      AGENT_SYSTEM_PROMPT: ${AGENT_SYSTEM_PROMPT:-}
      AGENT_SYSTEM_PROMPT_FILE: ${AGENT_SYSTEM_PROMPT_FILE:-}
    volumes:
      # Force read-only skill mounts in production (override any RW dev mount)
      - ./skills:/home/sandbox/skill:ro
      - ./skills:/sandbox/skills:ro
      - ./skills:/app/.pi/skills:ro
    deploy:
      resources:
        limits:
          cpus: "${AGENT_SVC_CPU_LIMIT:-2}"
          memory: "${AGENT_SVC_MEM_LIMIT:-1g}"
        reservations:
          cpus: "${AGENT_SVC_CPU_RESERVE:-0.5}"
          memory: "${AGENT_SVC_MEM_RESERVE:-256m}"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: always
    # Internal only — BFF reaches agent on the compose network
    ports: []

volumes:
  postgres_data:
    driver: local
  nginx_ssl:
    driver: local
  nginx_certbot:
    driver: local
