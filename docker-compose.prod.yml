# ── Pi Enterprise Sandbox — Production Docker Compose ─────────────
# Overlay on top of docker-compose.yml:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    image: enterprise-sandbox-nginx:latest
    container_name: pi-enterprise-nginx
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      # SSL certs (persistent — letsencrypt)
      - nginx_ssl:/etc/nginx/ssl
      # Let's Encrypt challenge directory
      - nginx_certbot:/var/www/certbot
    environment:
      DOMAIN: "${DOMAIN:-localhost}"
    depends_on:
      frontend:
        condition: service_started
      api-server:
        condition: service_started
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:80/nginx/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  sandbox:
    # ── Production resource limits ──────────────────────────────────
    deploy:
      resources:
        limits:
          cpus: "${SANDBOX_CPU_LIMIT:-2}"
          memory: "${SANDBOX_MEM_LIMIT:-1g}"
        reservations:
          cpus: "${SANDBOX_CPU_RESERVE:-0.5}"
          memory: "${SANDBOX_MEM_RESERVE:-256m}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${SANDBOX_PORT:-8081}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: always

  api-server:
    # ── Production resource limits ──────────────────────────────────
    deploy:
      resources:
        limits:
          cpus: "${BFF_CPU_LIMIT:-${AGENT_CPU_LIMIT:-1}}"
          memory: "${BFF_MEM_LIMIT:-${AGENT_MEM_LIMIT:-512m}}"
        reservations:
          cpus: "${BFF_CPU_RESERVE:-${AGENT_CPU_RESERVE:-0.25}}"
          memory: "${BFF_MEM_RESERVE:-${AGENT_MEM_RESERVE:-128m}}"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: always
    # No ports exposed in production — all traffic goes through nginx
    ports: []

  agent:
    # Production: skills stay read-only; skill management tools disabled.
    environment:
      SKILLS_MODE: ${SKILLS_MODE:-readonly}
      SKILLS_ROOT: /home/sandbox/skill
    volumes:
      # Force read-only skill mounts in production (override any RW dev mount)
      - ./skills:/home/sandbox/skill:ro
      - ./skills:/sandbox/skills:ro
      - ./skills:/app/.pi/skills:ro
    deploy:
      resources:
        limits:
          cpus: "${AGENT_SVC_CPU_LIMIT:-2}"
          memory: "${AGENT_SVC_MEM_LIMIT:-1g}"
        reservations:
          cpus: "${AGENT_SVC_CPU_RESERVE:-0.5}"
          memory: "${AGENT_SVC_MEM_RESERVE:-256m}"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: always
    # Internal only — BFF reaches agent on the compose network
    ports: []

volumes:
  nginx_ssl:
    driver: local
  nginx_certbot:
    driver: local
