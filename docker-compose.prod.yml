# ── Pi Enterprise Sandbox — Production Docker Compose ─────────────
# Overlay on top of docker-compose.yml:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Port publish safety (Compose merge):
#   Empty `ports: []` does NOT reliably clear base published ports.
#   Every non-edge service MUST use `ports: !reset []` (Compose reset tag)
#   so base dev loopback publishes are removed. After merge, only nginx
#   may publish host ports (80/443). Services remain reachable on
#   backend_internal / service_egress by DNS name (mysql, redis, …).
#
# Operator gate (requires Compose CLI; do not skip in CI/release):
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml config \
#     | … assert no published ports except nginx 80/443
#   See tests/test_compose_port_publish_security.py for offline static checks
#   and the exact gate command.
#
# Required env (no empty defaults for secrets):
#   MYSQL_PASSWORD, MYSQL_ROOT_PASSWORD, REDIS_PASSWORD,
#   SANDBOX_API_TOKEN, AGENT_INTERNAL_TOKEN, SANDBOX_JWT_SECRET
# Optional but recommended:
#   SANDBOX_CORS_ORIGINS, DOMAIN
# Optional DSN overrides (otherwise built from MYSQL_* / REDIS_PASSWORD):
#   AGENT_DATABASE_URL, SANDBOX_DATABASE_URL, AGENT_REDIS_URL, REDIS_URL

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-sandbox}
      MYSQL_USER: ${MYSQL_USER:-sandbox}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?Set MYSQL_PASSWORD for production}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD for production}
    # Same as base: app user is non-SUPER. Binary log + CREATE TRIGGER needs
    # log_bin_trust_function_creators=1 on this compose-managed mysqld.
    # If AGENT_DATABASE_URL points at external/managed MySQL instead of this
    # service, operators must set the equivalent platform flag — Agent will not
    # SET GLOBAL on remote hosts (fail-closed preflight before migrate).
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --log-bin-trust-function-creators=1
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "127.0.0.1",
          "-uroot",
          "-p${MYSQL_ROOT_PASSWORD}",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    restart: always
    # Clear base dev host publish (loopback 3306). Internal: backend_internal only.
    ports: !reset []

  redis:
    image: redis:7.2
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD for production}
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${REDIS_PASSWORD:?Set REDIS_PASSWORD for production}
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "-a",
          "${REDIS_PASSWORD}",
          "ping",
        ]
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 15s
    restart: always
    # Clear base dev host publish. Agent reaches Redis on backend_internal.
    ports: !reset []

  # Sandbox jti-replay only — independent secret + volume (never REDIS_PASSWORD).
  sandbox-replay-redis:
    image: redis:7.2
    environment:
      SANDBOX_INTERNAL_REDIS_PASSWORD: ${SANDBOX_INTERNAL_REDIS_PASSWORD:?Set SANDBOX_INTERNAL_REDIS_PASSWORD for production}
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${SANDBOX_INTERNAL_REDIS_PASSWORD:?Set SANDBOX_INTERNAL_REDIS_PASSWORD for production}
    volumes:
      - sandbox_replay_redis_data:/data
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "-a",
          "${SANDBOX_INTERNAL_REDIS_PASSWORD}",
          "ping",
        ]
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 15s
    restart: always
    ports: !reset []

  frontend:
    # SPA is only reached via nginx on the compose networks — never host-published.
    ports: !reset []

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    image: enterprise-sandbox-nginx:latest
    container_name: pi-enterprise-nginx
    # Sole public edge: host 80/443 only (not loopback-restricted).
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      # SSL certs (persistent — letsencrypt)
      - nginx_ssl:/etc/nginx/ssl
      # Let's Encrypt challenge directory
      - nginx_certbot:/var/www/certbot
    environment:
      DOMAIN: "${DOMAIN:-localhost}"
    depends_on:
      frontend:
        condition: service_started
      api-server:
        condition: service_started
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:80/nginx/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # Public edge needs egress (TLS/OCSP/cert tooling) + internal upstreams.
    networks:
      - backend_internal
      - service_egress

  sandbox:
    environment:
      DEPLOYMENT_ENV: production
      # Built from MYSQL_* secrets; do not embed live passwords in compose files.
      SANDBOX_DATABASE_URL: mysql+pymysql://${MYSQL_USER:-sandbox}:${MYSQL_PASSWORD:?Set MYSQL_PASSWORD for production}@mysql:3306/${MYSQL_DATABASE:-sandbox}
      SANDBOX_API_TOKEN: ${SANDBOX_API_TOKEN:?Set SANDBOX_API_TOKEN for production}
      SANDBOX_AUTH_ENABLED: ${SANDBOX_AUTH_ENABLED:-true}
      SANDBOX_JWT_SECRET: ${SANDBOX_JWT_SECRET:?Set SANDBOX_JWT_SECRET for production}
      SANDBOX_JWT_ISSUER: ${SANDBOX_JWT_ISSUER:-pi-enterprise-sandbox}
      SANDBOX_JWT_AUDIENCE: ${SANDBOX_JWT_AUDIENCE:-pi-enterprise-sandbox}
      SANDBOX_AUTH_ALLOW_PUBLIC_REGISTER: "false"
      SANDBOX_APPROVAL_MODE: ${APPROVAL_MODE:-${SANDBOX_APPROVAL_MODE:-}}
      SANDBOX_APPROVAL_ENABLED: ${APPROVAL_ENABLED:-${SANDBOX_APPROVAL_ENABLED:-}}
      # Internal plane mandatory in production (validate_production_settings).
      # Dedicated sandbox-replay-redis + independent SANDBOX_INTERNAL_REDIS_PASSWORD.
      # Never REDIS_PASSWORD / AGENT_REDIS_URL (DB index alone is not isolation).
      SANDBOX_INTERNAL_PLANE_ENABLED: "true"
      SANDBOX_INTERNAL_REDIS_URL: redis://:${SANDBOX_INTERNAL_REDIS_PASSWORD:?Set SANDBOX_INTERNAL_REDIS_PASSWORD for production}@sandbox-replay-redis:6379/0
      SANDBOX_INTERNAL_HMAC_KEYRING: ${SANDBOX_INTERNAL_HMAC_KEYRING:?Set SANDBOX_INTERNAL_HMAC_KEYRING for production}
      SANDBOX_INTERNAL_HMAC_ACTIVE_KID: ${SANDBOX_INTERNAL_HMAC_ACTIVE_KID:?Set SANDBOX_INTERNAL_HMAC_ACTIVE_KID for production}
      SANDBOX_INTERNAL_MAX_CONCURRENCY: ${SANDBOX_INTERNAL_MAX_CONCURRENCY:-64}
      # Must be > 0 so drain+UNKNOWN reconcile can run before resource close.
      SANDBOX_INTERNAL_DRAIN_TIMEOUT_SECONDS: ${SANDBOX_INTERNAL_DRAIN_TIMEOUT_SECONDS:-30}
      # Execution policy: disabled only (Bubblewrap --unshare-net). allowlist is
      # fail-closed in production until a real per-child egress proxy exists.
      SANDBOX_NETWORK_MODE: disabled
      SANDBOX_POLICY_PROFILE: strict
      SANDBOX_ISOLATION_BACKEND: bubblewrap
      SANDBOX_ISOLATION_REQUIRED: "true"
      SANDBOX_CORS_ORIGINS: ${SANDBOX_CORS_ORIGINS:?Set SANDBOX_CORS_ORIGINS for production (no wildcard)}
      SANDBOX_CORS_ALLOW_CREDENTIALS: ${SANDBOX_CORS_ALLOW_CREDENTIALS:-true}
      SANDBOX_DEBUG: "false"
    depends_on:
      mysql:
        condition: service_healthy
      sandbox-replay-redis:
        condition: service_healthy
    # No host port publish — Sandbox API only on backend_internal.
    ports: !reset []
    # ── Production resource limits ──────────────────────────────────
    deploy:
      resources:
        limits:
          cpus: "${SANDBOX_CPU_LIMIT:-2}"
          memory: "${SANDBOX_MEM_LIMIT:-1g}"
        reservations:
          cpus: "${SANDBOX_CPU_RESERVE:-0.5}"
          memory: "${SANDBOX_MEM_RESERVE:-256m}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${SANDBOX_PORT:-8081}/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: always
    # Reinforce base topology: Sandbox never joins service_egress.
    networks:
      - backend_internal

  api-server:
    environment:
      DEPLOYMENT_ENV: production
      SANDBOX_API_TOKEN: ${SANDBOX_API_TOKEN:?Set SANDBOX_API_TOKEN for production}
      AGENT_INTERNAL_TOKEN: ${AGENT_INTERNAL_TOKEN:?Set AGENT_INTERNAL_TOKEN for production}
      AUTH_ENABLED: ${AUTH_ENABLED:-true}
      SANDBOX_AUTH_ENABLED: ${SANDBOX_AUTH_ENABLED:-true}
    # ── Production resource limits ──────────────────────────────────
    deploy:
      resources:
        limits:
          cpus: "${BFF_CPU_LIMIT:-${AGENT_CPU_LIMIT:-1}}"
          memory: "${BFF_MEM_LIMIT:-${AGENT_MEM_LIMIT:-512m}}"
        reservations:
          cpus: "${BFF_CPU_RESERVE:-${AGENT_CPU_RESERVE:-0.25}}"
          memory: "${BFF_MEM_RESERVE:-${AGENT_MEM_RESERVE:-128m}}"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: always
    # No host ports — BFF only on backend_internal; clients hit nginx.
    ports: !reset []

  agent:
    # Production: skills stay read-only; skill management tools disabled.
    environment:
      DEPLOYMENT_ENV: production
      SANDBOX_API_TOKEN: ${SANDBOX_API_TOKEN:?Set SANDBOX_API_TOKEN for production}
      AGENT_INTERNAL_TOKEN: ${AGENT_INTERNAL_TOKEN:?Set AGENT_INTERNAL_TOKEN for production}
      AGENT_DATABASE_URL: mysql://${MYSQL_USER:-sandbox}:${MYSQL_PASSWORD:?Set MYSQL_PASSWORD for production}@mysql:3306/${MYSQL_DATABASE:-sandbox}
      # HTTP Agent is the sole migration owner; worker depends on Agent health.
      AGENT_MIGRATE_ON_START: ${AGENT_MIGRATE_ON_START:-true}
      # Built from REDIS_PASSWORD; do not embed live passwords in compose files.
      # Fail-fast when REDIS_PASSWORD is unset (no empty/auth-less production Redis).
      REDIS_URL: redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD for production}@redis:6379/0
      AGENT_REDIS_URL: redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD for production}@redis:6379/0
      AGENT_RUNS_QUEUE_NAME: ${AGENT_RUNS_QUEUE_NAME:-agent-runs}
      AGENT_RUN_LEASE_TTL_MS: ${AGENT_RUN_LEASE_TTL_MS:-30000}
      AGENT_RUN_LEASE_RENEW_INTERVAL_MS: ${AGENT_RUN_LEASE_RENEW_INTERVAL_MS:-10000}
      AGENT_RUN_STREAM_MAXLEN: ${AGENT_RUN_STREAM_MAXLEN:-10000}
      SANDBOX_POLICY_PROFILE: strict
      SANDBOX_ISOLATION_BACKEND: bubblewrap
      SANDBOX_ISOLATION_REQUIRED: "true"
      SKILLS_MODE: readonly
      SKILLS_ROOT: /home/sandbox/skill
      # Clear any product prompt file path unless explicitly provided.
      AGENT_SYSTEM_PROMPT: ${AGENT_SYSTEM_PROMPT:-}
      AGENT_SYSTEM_PROMPT_FILE: ${AGENT_SYSTEM_PROMPT_FILE:-}
    volumes:
      # Force read-only skill mounts in production (override any RW dev mount)
      - ./skills:/home/sandbox/skill:ro
      - ./skills:/sandbox/skills:ro
      - ./skills:/app/.pi/skills:ro
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "${AGENT_SVC_CPU_LIMIT:-2}"
          memory: "${AGENT_SVC_MEM_LIMIT:-1g}"
        reservations:
          cpus: "${AGENT_SVC_CPU_RESERVE:-0.5}"
          memory: "${AGENT_SVC_MEM_RESERVE:-256m}"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: always
    # Internal only — BFF reaches agent on backend_internal (+ egress for LLM).
    ports: !reset []
    command: ["node", "server.js"]

  agent-worker:
    environment:
      DEPLOYMENT_ENV: production
      SANDBOX_API_TOKEN: ${SANDBOX_API_TOKEN:?Set SANDBOX_API_TOKEN for production}
      AGENT_INTERNAL_TOKEN: ${AGENT_INTERNAL_TOKEN:?Set AGENT_INTERNAL_TOKEN for production}
      AGENT_DATABASE_URL: mysql://${MYSQL_USER:-sandbox}:${MYSQL_PASSWORD:?Set MYSQL_PASSWORD for production}@mysql:3306/${MYSQL_DATABASE:-sandbox}
      REDIS_URL: redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD for production}@redis:6379/0
      AGENT_REDIS_URL: redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD for production}@redis:6379/0
      AGENT_RUNS_QUEUE_NAME: ${AGENT_RUNS_QUEUE_NAME:-agent-runs}
      AGENT_WORKER_CONCURRENCY: ${AGENT_WORKER_CONCURRENCY:-1}
      AGENT_SESSION_WORKSPACE_CWD: ${AGENT_SESSION_WORKSPACE_CWD:-/home/sandbox/workspace}
      AGENT_PI_AGENT_DIR: ${AGENT_PI_AGENT_DIR:-/app/pi-agent-home}
      SKILLS_MODE: readonly
    volumes:
      - ./skills:/home/sandbox/skill:ro
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    # Never published (base has no ports either); reset for merge safety.
    ports: !reset []
    command: ["node", "worker.js"]

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  sandbox_replay_redis_data:
    driver: local
  nginx_ssl:
    driver: local
  nginx_certbot:
    driver: local
