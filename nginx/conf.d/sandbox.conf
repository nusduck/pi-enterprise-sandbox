# ── Pi Enterprise Sandbox — Main Server Config ─────────────────────
# Redirect HTTP → HTTPS
server {
    listen 80 default_server;
    server_name ${DOMAIN};

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS Server ────────────────────────────────────────────────────
server {
    listen 443 ssl http2 default_server;
    server_name ${DOMAIN};

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # ── Security headers ─────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' ws:; frame-ancestors 'none';" always;

    # ── Status endpoint (not proxied) ────────────────────────────────
    location /nginx/status {
        stub_status;
        allow 127.0.0.1;
        deny all;
    }

    # ── Static assets (cached) ───────────────────────────────────────
    location /assets/ {
        limit_req zone=static burst=200 nodelay;
        proxy_pass http://pi-agent:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long cache for fingerprinted assets
        add_header Cache-Control "public, immutable, max-age=31536000";
        access_log off;
    }

    # ── SSE streaming (no buffering) ─────────────────────────────────
    location /api/proxy/llm {
        limit_req zone=api burst=30 nodelay;
        proxy_pass http://pi-agent:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Required for SSE streaming
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        chunked_transfer_encoding on;
    }

    # ── API endpoints (no cache) ─────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=30 nodelay;
        proxy_pass http://pi-agent:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;

        # Don't cache API responses
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        expires off;

        # SSE streaming for chat endpoints
        location /api/conversations/ {
            location /api/conversations/.*/chat {
                proxy_buffering off;
                proxy_cache off;
            }
            proxy_pass http://pi-agent:3000;
        }
    }

    # ── Root (SSR entry or SPA fallback) ─────────────────────────────
    location / {
        limit_req zone=api burst=30 nodelay;
        proxy_pass http://pi-agent:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SPA fallback: serve index.html for unknown paths
        proxy_intercept_errors on;
        error_page 404 =200 /index.html;
    }
}
