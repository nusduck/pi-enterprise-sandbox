# ── Pi Enterprise Sandbox — Main Server Config ─────────────────────
# Production Nginx: TLS termination + reverse proxy to frontend + api-server

# Redirect HTTP → HTTPS
server {
    listen 80 default_server;
    server_name ${DOMAIN};

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS Server ────────────────────────────────────────────────────
server {
    listen 443 ssl http2 default_server;
    server_name ${DOMAIN};

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # ── Security headers ─────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Status endpoint (not proxied) ────────────────────────────────
    location /nginx/status {
        stub_status;
        allow 127.0.0.1;
        deny all;
    }

    # ── Static assets (cached, served by frontend Nginx) ─────────────
    location /assets/ {
        limit_req zone=static burst=200 nodelay;
        proxy_pass http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long cache for fingerprinted assets
        add_header Cache-Control "public, immutable, max-age=31536000";
        access_log off;
    }

    # ── API + SSE streaming (→ api-server:4000) ─────────────────────
    location /api/ {
        limit_req zone=api burst=30 nodelay;
        # Explicit override so this location cannot inherit a tighter limit.
        client_max_body_size 55m;
        proxy_pass http://api-server:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;

        # Don't cache API responses
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        expires off;

        # SSE streaming: disable buffering for /api/chat
        proxy_buffering off;
        proxy_cache off;
        # Stream large multipart uploads without buffering the full body.
        proxy_request_buffering off;
        proxy_set_header Connection '';
        chunked_transfer_encoding on;
    }

    # ── Root — SPA from frontend Nginx ───────────────────────────────
    location / {
        limit_req zone=api burst=30 nodelay;
        proxy_pass http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SPA fallback: serve index.html for unknown paths
        proxy_intercept_errors on;
        error_page 404 =200 /index.html;
    }
}
