services:
  # ── Frontend — SPA (Nginx) ────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ${FRONTEND_IMAGE:-pi-enterprise-frontend:latest}
    container_name: ${FRONTEND_CONTAINER:-pi-enterprise-frontend}
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    restart: unless-stopped
    depends_on:
      api-server:
        condition: service_started

  # ── API Server — REST API (Node.js + pi-coding-agent) ────
  api-server:
    build:
      context: ./api-server
      dockerfile: Dockerfile
    image: ${API_IMAGE:-pi-enterprise-api:latest}
    container_name: ${API_CONTAINER:-pi-enterprise-api}
    ports:
      - "${API_PORT:-4000}:4000"
    env_file:
      - ${API_ENV_FILE:-.env}
    environment:
      SANDBOX_BASE_URL: http://sandbox:8081
      SANDBOX_API_TOKEN: ${SANDBOX_API_TOKEN:-}
      LLMIO_BASE_URL: ${LLMIO_BASE_URL:-}
      LLMIO_API_KEY: ${LLMIO_API_KEY:-}
      PORT: 4000
    volumes:
      - ./skills:/sandbox/skills:ro
      - ./skills:/app/.pi/skills:ro
    restart: unless-stopped
    depends_on:
      sandbox:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/api/status',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Sandbox — Safe Execution Environment (Python FastAPI) ─
  sandbox:
    build:
      context: .
      dockerfile: ${SANDBOX_DOCKERFILE:-sandbox/Dockerfile}
    image: ${SANDBOX_IMAGE:-enterprise-sandbox:latest}
    container_name: ${SANDBOX_CONTAINER:-pi-enterprise-sandbox}
    ports:
      - "${SANDBOX_MCP_HOST_PORT:-8093}:${SANDBOX_MCP_PORT:-8091}"
    volumes:
      - ${SANDBOX_SKILLS_MOUNT:-./skills:/sandbox/skills:ro}
      - ${SANDBOX_SKILLS_MOUNT:-./skills:/app/.pi/skills:ro}
      - ${SANDBOX_WORKSPACES_MOUNT:-./workspaces:/var/sandbox/workspaces}
      - ${SANDBOX_DATA_VOLUME:-sandbox_data}:/sandbox/data
    environment:
      SANDBOX_HOST: 0.0.0.0
      SANDBOX_PORT: 8081
      SANDBOX_MCP_HOST: 0.0.0.0
      SANDBOX_MCP_PORT: 8091
      SANDBOX_MCP_ENABLED: ${SANDBOX_MCP_ENABLED:-true}
      SANDBOX_LOG_LEVEL: ${SANDBOX_LOG_LEVEL:-INFO}
      SANDBOX_DATABASE_URL: ${SANDBOX_DATABASE_URL:-sqlite:////sandbox/data/sandbox.db}
      SANDBOX_WORKSPACES_ROOT: /var/sandbox/workspaces
      SANDBOX_SKILLS_ROOT: /sandbox/skills
      SANDBOX_EXECUTION_TIMEOUT_SECONDS: ${SANDBOX_EXECUTION_TIMEOUT_SECONDS:-120}
      SANDBOX_MAX_OUTPUT_CHARS: ${SANDBOX_MAX_OUTPUT_CHARS:-50000}
      SANDBOX_MAX_PROCESS_COUNT: ${SANDBOX_MAX_PROCESS_COUNT:-20}
      SANDBOX_MAX_CPU_TIME_SECONDS: ${SANDBOX_MAX_CPU_TIME_SECONDS:-300}
      SANDBOX_MAX_MEMORY_MB: ${SANDBOX_MAX_MEMORY_MB:-512}
      SANDBOX_MAX_FILE_SIZE_MB: ${SANDBOX_MAX_FILE_SIZE_MB:-50}
      SANDBOX_WORKSPACE_QUOTA_MB: ${SANDBOX_WORKSPACE_QUOTA_MB:-500}
      SANDBOX_SESSION_TTL_MINUTES: ${SANDBOX_SESSION_TTL_MINUTES:-30}
      SANDBOX_CLEANUP_INTERVAL_MINUTES: ${SANDBOX_CLEANUP_INTERVAL_MINUTES:-5}
      SANDBOX_IPTABLES_ENABLED: ${SANDBOX_IPTABLES_ENABLED:-true}
      SANDBOX_IPTABLES_DEFAULT_POLICY: ${SANDBOX_IPTABLES_DEFAULT_POLICY:-DROP}
      SANDBOX_ALLOWED_TCP_PORTS: ${SANDBOX_ALLOWED_TCP_PORTS:-}
      SANDBOX_ALLOWED_UDP_PORTS: ${SANDBOX_ALLOWED_UDP_PORTS:-}
      SANDBOX_ALLOWED_CIDRS: ${SANDBOX_ALLOWED_CIDRS:-}
      SANDBOX_UVICORN_WORKERS: ${SANDBOX_UVICORN_WORKERS:-1}
      SANDBOX_UVICORN_PROXY_HEADERS: true
      SANDBOX_API_TOKEN: ${SANDBOX_API_TOKEN:-}
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    cap_add:
      - NET_ADMIN
      - NET_RAW

volumes:
  sandbox_data:
