services:
  sandbox:
    build:
      context: .
      dockerfile: sandbox/Dockerfile
    image: enterprise-sandbox:latest
    container_name: pi-enterprise-sandbox
    ports:
      - "8083:8081"
      - "8093:8091"
    volumes:
      - ./skills:/sandbox/skills:ro
      - ./workspaces:/sandbox/workspaces
      - sandbox_data:/sandbox/data
    environment:
      SANDBOX_HOST: "0.0.0.0"
      SANDBOX_PORT: 8081
      SANDBOX_MCP_PORT: 8091
      SANDBOX_MCP_ENABLED: "true"
      SANDBOX_LOG_LEVEL: "INFO"
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    cap_add:
      - NET_ADMIN
      - NET_RAW

  pi-agent:
    build:
      context: .
      target: agent-base
    image: enterprise-pi-agent:latest
    container_name: pi-enterprise-agent
    user: "10001:10001"
    ports:
      - "3000:3000"
    volumes:
      - ./skills:/home/pi-agent/.pi/agent/skills:ro
      - ./config/agent/settings.json:/home/pi-agent/.pi/agent/settings.json:ro
      - ./config/agent/models.json:/home/pi-agent/.pi/agent/models.json:ro
    env_file:
      - .env
    environment:
      SANDBOX_BASE_URL: http://sandbox:8081
    stdin_open: true
    tty: true
    restart: unless-stopped
    depends_on:
      sandbox:
        condition: service_healthy

networks:
  default:
    driver: bridge
    # NOTE: Outbound network isolation is enforced by iptables rules
    # inside the sandbox container (cap_add: NET_ADMIN). Docker's
    # internal:true is NOT used because it breaks host port publishing.

volumes:
  sandbox_data:
