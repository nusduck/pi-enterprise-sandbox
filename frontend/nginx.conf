server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Align with product limits: 50MB file + multipart overhead (BFF 55MB).
    # Nginx default is 1m, which rejects normal attachments with HTTP 413.
    client_max_body_size 55m;
    client_body_timeout 300s;

    # API proxy to backend
    location /api/ {
        proxy_pass http://api-server:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;  # Required for SSE
        proxy_cache off;
        # Stream large multipart uploads to the BFF without full buffering.
        proxy_request_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
