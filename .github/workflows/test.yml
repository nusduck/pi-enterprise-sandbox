name: Test

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  python:
    name: Python (pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install project with test extras
        run: uv sync --extra test

      - name: Run pytest
        run: uv run pytest tests/ -q --tb=short

  node-api:
    name: Node API (tests + syntax)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: api-server/package-lock.json

      - name: Install API Server dependencies
        run: npm ci --prefix api-server

      - name: Run API Server unit tests
        run: node --test api-server/tests/*.test.js api-server/tests/sdk-compat/*.test.js

      - name: Syntax-check API Server sources
        run: |
          find api-server -name '*.js' -type f ! -path '*/node_modules/*' -print0 \
            | xargs -0 -n1 node --check

  frontend:
    name: Frontend (test + build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Run frontend unit tests
        run: npm test --prefix frontend

      - name: Production build
        run: npm run build --prefix frontend

  compose:
    name: Compose config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker compose file
        run: |
          # env_file references .env; use the committed template (no real secrets)
          if [ ! -f .env ]; then cp .env.example .env; fi
          docker compose config -q
